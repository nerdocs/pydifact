name: "Check Format"

on:
  push:
    branches:
      - all
  pull_request: { }
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: "Ruff format check"
        run: |
          uv run ruff format --check .
      - name: "Ruff import sorting check"
        run: |
          uv run ruff check .
