name: "Check Format"

on:
  push:
    branches:
      - all
  pull_request: { }
jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: "Black Code Formatter"
        run: |
          uv run black . --check
